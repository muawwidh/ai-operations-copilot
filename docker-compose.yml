services:
  postgres:
    image: postgres:16
    container_name: ai_operations_postgres
    environment:
      POSTGRES_DB: ai_operations_copilot
      POSTGRES_USER: copilot_user
      POSTGRES_PASSWORD: copilot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U copilot_user -d ai_operations_copilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: ai_operations_backend
    environment:
      APP_NAME: AI Operations Copilot
      APP_ENV: development
      APP_DEBUG: "true"
      API_PREFIX: /api

      DATABASE_URL: postgresql+psycopg2://copilot_user:copilot_password@postgres:5432/ai_operations_copilot

      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: gpt-4o-mini
      OPENAI_EMBEDDING_MODEL: text-embedding-3-small

      CHROMA_PERSIST_DIR: ./chroma_db
      CHROMA_COLLECTION_NAME: operations_documents
      UPLOAD_DIR: ./uploads

      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - backend_uploads:/app/uploads
      - backend_chroma:/app/chroma_db
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/streamlit_app
    container_name: ai_operations_frontend
    environment:
      API_BASE_URL: http://backend:8000
    ports:
      - "8501:8501"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_uploads:
  backend_chroma:
services:
  postgres:
    image: postgres:16
    container_name: ai_operations_postgres
    environment:
      POSTGRES_DB: ai_operations_copilot
      POSTGRES_USER: copilot_user
      POSTGRES_PASSWORD: copilot_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: